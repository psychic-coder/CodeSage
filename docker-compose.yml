services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env.docker
    depends_on: [postgres, neo4j, qdrant, redis, minio]
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env.docker
    depends_on: [postgres, neo4j, qdrant, redis, minio]
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: .env.docker
    depends_on: [backend]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: codesage
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]

  neo4j:
    image: neo4j:5.18
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_data:/qdrant/storage
    ports: ["6333:6333"]

  redis:
    image: redis:7.2-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports: ["80:80"]
    depends_on: [backend, frontend]

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  minio_data: