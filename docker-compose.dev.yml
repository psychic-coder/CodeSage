# Development overrides — mount source, enable hot-reload.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  frontend:
    # Override CMD to run the dev server instead of the production build
    entrypoint: []
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
