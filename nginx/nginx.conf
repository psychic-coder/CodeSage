# ─────────────────────────────────────────────────────────────────────────────
# CodeSage — Nginx production configuration
# ─────────────────────────────────────────────────────────────────────────────

# Worker tuning
worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Performance ─────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 1000;

  # Hide nginx version from Server header
  server_tokens off;

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_min_length   256;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml application/atom+xml
    image/svg+xml font/woff font/woff2;

  # ── Logging ─────────────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"duration":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"ip":"$remote_addr",'
    '"forwarded_for":"$http_x_forwarded_for",'
    '"user_agent":"$http_user_agent"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log  warn;

  # ── Rate limiting zones ──────────────────────────────────────────────────────
  # Keyed by client IP — 10m cache holds ~160k IPs
  limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
  limit_req_zone $binary_remote_addr zone=ingest:10m   rate=5r/m;
  limit_req_zone $binary_remote_addr zone=analysis:10m rate=100r/m;
  limit_req_status 429;

  # ── Upstream: backend API ────────────────────────────────────────────────────
  upstream backend {
    server backend:8000;
    keepalive 32;
  }

  # ── Upstream: Next.js frontend ───────────────────────────────────────────────
  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # ── Security headers (applied to all responses) ──────────────────────────────
  add_header X-Frame-Options          "SAMEORIGIN"                  always;
  add_header X-Content-Type-Options   "nosniff"                     always;
  add_header X-XSS-Protection         "1; mode=block"               always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
  # HSTS — enable once TLS is confirmed working (uncomment for production)
  # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # ── Main server block ────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name rohitganguly.dev www.rohitganguly.dev _;

    # Max upload size (repo zip uploads)
    client_max_body_size 550m;

    # ── Health check (no auth, no rate limit) ──────────────────────────────────
    location = /health {
      proxy_pass         http://backend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      access_log         off;
    }

    location ~ ^/health/ {
      proxy_pass         http://backend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      access_log         off;
    }

    # ── SSE streaming (must not buffer) ───────────────────────────────────────
    location ~ ^/api/v1/analysis/improvements/.*/stream {
      limit_req           zone=analysis burst=20 nodelay;

      proxy_pass          http://backend;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_set_header    Connection        '';
      proxy_http_version  1.1;

      # Disable ALL buffering — SSE events must flow immediately
      proxy_buffering          off;
      proxy_cache              off;
      proxy_read_timeout       300s;
      proxy_send_timeout       300s;
      chunked_transfer_encoding on;
    }

    # ── Ingest (heavy upload — lower rate limit) ──────────────────────────────
    location /api/v1/ingest {
      limit_req           zone=ingest burst=2 nodelay;

      proxy_pass          http://backend;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_read_timeout  120s;
    }

    # ── API (general) ─────────────────────────────────────────────────────────
    location /api/ {
      limit_req           zone=api burst=30 nodelay;

      proxy_pass          http://backend;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_http_version  1.1;
      proxy_set_header    Connection        "";
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
      proxy_pass          http://backend;
      proxy_http_version  1.1;
      proxy_set_header    Upgrade           $http_upgrade;
      proxy_set_header    Connection        "upgrade";
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_read_timeout  3600s;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
      proxy_pass          http://frontend;
      proxy_set_header    Host              $host;
      proxy_set_header    X-Real-IP         $remote_addr;
      proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header    X-Forwarded-Proto $scheme;
      proxy_http_version  1.1;
      proxy_set_header    Connection        "";
    }
  }
}