[pytest]
# Discover tests anywhere under the tests/ directory
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# asyncio mode: auto means pytest-asyncio automatically handles async test functions
asyncio_mode = auto

# Add the backend root to sys.path so `from app.xxx import ...` works without install
pythonpath = .

# Show short summary of failures and verbose output
addopts = -v --tb=short
