name: CI

on:
  push:
    branches: ["main", "master", "fix/**", "feature/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend – lint, security & tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=1s
          --health-timeout=5s
          --health-retries=30
      neo4j:
        image: neo4j:5.18
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval=1s
          --health-timeout=5s
          --health-retries=60
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=1s
          --health-timeout=5s
          --health-retries=30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff bandit
          pip install -e backend

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app --select E,F,W,I --ignore E501 --output-format=github

      # ── Security scan ─────────────────────────────────────────────────────
      - name: Security scan (bandit)
        run: |
          cd backend
          bandit -r app -ll -ii --exclude app/tests 2>&1 | tee bandit-report.txt
          # Exit non-zero only on HIGH severity + HIGH confidence findings
          bandit -r app -ll -ii --exit-zero --exclude app/tests

      # ── DB readiness ───────────────────────────────────────────────────────
      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import time, os
          import psycopg2
          url = os.getenv('ALEMBIC_DATABASE_URL','postgresql://postgres:postgres@localhost:5432/postgres')
          for i in range(30):
              try:
                  psycopg2.connect(url); print('postgres ready'); break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('postgres did not become ready')
          PY

      - name: Wait for Neo4j and Redis
        run: |
          python - <<'PY'
          import time
          from neo4j import GraphDatabase
          import redis

          for i in range(60):
              try:
                  drv = GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j','password'))
                  drv.verify_connectivity(); print('neo4j ready'); break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('neo4j did not become ready')

          for i in range(30):
              try:
                  r = redis.Redis.from_url('redis://localhost:6379/0')
                  if r.ping(): print('redis ready'); break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit('redis did not become ready')
          PY

      - name: Run Alembic migrations
        env:
          ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          cd backend
          alembic upgrade head

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          OPENAI_API_KEY: sk-test
        run: |
          cd backend
          pytest -q --tb=short

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: backend/bandit-report.txt

  frontend:
    name: Frontend – build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Type-check (tsc)
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build frontend
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: |
          cd frontend
          npm run build

